# factory-grid-executor: quarantined
name: Deploy (Quarantined)

on:
  workflow_dispatch:

jobs:
  deploy-quarantined:
    runs-on: ubuntu-latest
    steps:
      - name: Explain executor ownership
        run: |
          echo "GitHub Actions deploy execution is quarantined for this repo."
          echo "BitterGrid owns source intake, build, release, deploy, and verification for this runtime path."
          echo "Use Factory/BitterGrid source reconciliation instead of GitHub Actions deploys."
          exit 1
