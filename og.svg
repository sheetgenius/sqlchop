<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f0f0f"/>
  <rect x="0" y="0" width="1200" height="4" fill="#c8a84e"/>
  <text x="80" y="220" font-family="monospace" font-size="72" font-weight="bold" fill="#e0d8c8">sqlchop</text>
  <text x="80" y="290" font-family="monospace" font-size="28" fill="#8f8577">SQL formatter &amp; beautifier</text>
  <text x="80" y="390" font-family="monospace" font-size="22" fill="#c8a84e">SELECT u.name, COUNT(o.id)</text>
  <text x="80" y="430" font-family="monospace" font-size="22" fill="#c8a84e">FROM users u JOIN orders o ON u.id = o.user_id</text>
  <text x="80" y="470" font-family="monospace" font-size="22" fill="#c8a84e">GROUP BY u.name ORDER BY 2 DESC;</text>
  <text x="80" y="540" font-family="monospace" font-size="18" fill="#8f8577">PostgreSQL · MySQL · T-SQL · BigQuery · SQLite · Nothing uploaded · Free</text>
  <text x="80" y="600" font-family="monospace" font-size="16" fill="#3a3a3a">bitter.sh</text>
</svg>
